    <!-- Casewell resolves at build time (Vite HTML env replacement); the config
         defaults it to "Cortex" so unbranded builds are unchanged. -->
    <title>Casewell</title>
    <!-- Apply the stored theme before the bundle loads so a dark-mode reload never flashes light.
         Keep in sync with src/lib/theme.ts (@cortex/ui). -->
    <script>
      try {
        var t = localStorage.getItem("cortex.theme");
        if (t === "dark" || ((t === null || t === "system") && matchMedia("(prefers-color-scheme: dark)").matches))
          document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
